kind = "web"
previewPath = "/"
title = "Game Docking Station"
version = "1.0.0"
id = "artifacts/game-fusion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20230

[services.development]
run = "pnpm --filter @workspace/game-fusion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/game-fusion", "run", "build" ]
publicDir = "artifacts/game-fusion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20230"
BASE_PATH = "/"
